server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    # ── Proxy Indevolt appareil (IP dynamique) ──────────────────
    # Captures nommées pour compatibilité nginx
    location ~ ^/indevolt-api/(?<devip>192\.168\.1\.[0-9]+)/(?<devpath>.+)$ {
        proxy_pass http://$devip:8080/rpc/$devpath$is_args$args;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            return 204;
        }
    }

    # Bloquer toute IP hors 192.168.1.x (ex: 10.x, 127.x, etc.)
    location ~ ^/indevolt-api/ {
        return 403;
    }

    # ── Proxy OpenDTU (IP dynamique, captures nommées) ─────────
    location ~ ^/opendtu-api/(?<dtuip>192\.168\.1\.[0-9]+)/(?<dtupath>.+)$ {
        proxy_pass http://$dtuip/$dtupath$is_args$args;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            return 204;
        }
    }

    # Bloquer toute IP OpenDTU hors 192.168.1.x
    location ~ ^/opendtu-api/ {
        return 403;
    }

    # ── Proxy Settings & Store API (sidecar Python Docker) ─────
    location /api/ {
        proxy_pass http://settings-api:8081/api/;
        proxy_connect_timeout 3s;
        proxy_read_timeout    5s;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            return 204;
        }
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
